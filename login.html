<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Livora Interiors</title>
    <link rel="icon" href="https://i.ibb.co/67CXXSy0/logo-lww.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="font-fix.css" />
    
    <style>
        /* Reusing your exact styles, but customizing the login layout */
        .login-section {
            min-height: calc(100vh - 112px - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 28px;
        }
        .login-card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            padding: 60px 50px;
            border: 1px solid var(--line);
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(45, 36, 31, 0.04);
        }
        .login-card h2 {
            font-size: 38px;
            margin-bottom: 10px;
            color: var(--dark);
        }
        .login-card p {
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 30px;
        }
        .login-card .form-status {
            color: #bf3131; /* Red for errors */
            font-weight: 600;
            font-size: 14px;
            margin-top: 12px;
        }
        .login-card .form-status.success {
            color: #6f805d; /* Green for success */
        }
        .login-card .button-dark {
            width: 100%;
            margin-top: 10px;
        }
        .login-card .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
        }
        .login-card .back-link:hover {
            text-decoration: underline;
        }
        /* Overriding existing styles for input */
        .login-card input {
            background: var(--cream);
        }
    </style>
</head>
<body>

    <!-- Simple Header -->
    <header class="site-header">
        <a class="brand" href="index.html">
            <img src="https://i.ibb.co/67CXXSy0/logo-lww.jpg" alt="Livora Logo" style="max-width:80px;height:auto;" />
        </a>
        <a href="index.html" style="color: var(--muted); text-decoration: none; font-weight: 600;">← Back to site</a>
    </header>

    <section class="login-section">
        <div class="login-card reveal visible">
            <h2>Welcome back</h2>
            <p>Sign in to your project dashboard</p>
            
            <form id="login-form">
                <label>
                    Email address
                    <input type="email" id="email" required placeholder="admin@livorainteriors.com" />
                </label>
                <label>
                    Password
                    <input type="password" id="password" required placeholder="Enter your password" />
                </label>
                <button class="button button-dark" type="submit">Sign in</button>
                <p class="form-status" id="login-status" aria-live="polite"></p>
            </form>
            
            <a class="back-link" href="index.html">Return to homepage</a>
        </div>
    </section>

    <!-- Supabase Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <!-- Login Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const statusEl = document.getElementById('login-status');
            
            // If user is already logged in, bounce them straight to the dashboard
            checkUser().then(user => {
                if (user) {
                    window.location.href = 'admin.html'; 
                }
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                statusEl.textContent = '';
                statusEl.className = 'form-status';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                // Call Supabase login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    statusEl.textContent = error.message; // e.g., "Invalid login credentials"
                    return;
                }

                if (data.user) {
                    statusEl.textContent = "Login successful! Redirecting...";
                    statusEl.classList.add('success');
                    
                    // Redirect after a tiny delay
                    setTimeout(() => {
                        window.location.href = 'admin.html'; 
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
