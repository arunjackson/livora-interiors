<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Studio Dashboard — Livora</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="font-fix.css"><link rel="stylesheet" href="admin.css"></head><body class="admin"><header class="admin-top"><a href="index.html">← View website</a><span>Livora <i>Studio dashboard</i></span></header><main class="admin-wrap"><section class="admin-intro"><p class="eyebrow">Portfolio manager</p><h1>Add a new project</h1><p>Upload an image from your computer. It will appear immediately on the Portfolio page in this browser.</p></section><form id="project-form" class="admin-form"><label>Project title<input required name="title" placeholder="e.g. Serenity Residence"></label><label>Room category<select required name="category"><option value="living-room">Living room</option><option value="bedroom">Bedroom</option><option value="kitchen">Kitchen</option><option value="dining">Dining</option><option value="pooja-room">Pooja room</option></select></label><label>Project image<input required name="image" type="file" accept="image/*"></label><button class="button button-dark">Add project</button><p id="admin-message"></p></form><section><div class="manage-heading"><h2>Current projects</h2><button id="reset" class="reset">Restore original projects</button></div><div id="admin-projects" class="admin-projects"></div></section></main><script src="admin.js"></script></body></html>
